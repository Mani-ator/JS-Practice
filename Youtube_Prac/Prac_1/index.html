<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prac_1</title>
</head>
<body>
    <h1 style="font-size: 30px;">Cart Quantity</h1>
    <button onclick="console.log(`Carty Quantity: ${CartQty}`);">Show Quantity</button>
    <button onclick="console.log(`Carty Quantity: ${CartQty+=1}`);">Add To Cart</button>
    <button onclick="console.log(`Carty Quantity: ${CartQty+=2}`);">+2</button>
    <button onclick="console.log(`Carty Quantity: ${CartQty+=3}`);">+3</button>
    <button onclick="console.log(`Carty Quantity: ${CartQty=0}`);">Reset Cart</button>
    <script>
        let CartQty = 0;
    </script>
</body>
</html>
