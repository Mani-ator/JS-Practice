<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prac_3</title>
</head>
<body>
    <H1>Rock Paper Scissors</H1>
    <button onclick="
        compChoice();
        if (choice === 'rock') {
            alert(`Tie. Both Computer And User Chose ${choice}`);
        } else if (choice === 'paper'){
            alert(`Computer Won. Computer Chose ${choice} User Chose Rock`);
        } else if (choice === 'scissors'){
            alert(`User Won. Computer Chose ${choice} User Chose Rock`)
        }
    
    ">Rock</button>
    <button onclick="
        compChoice();
        if (choice === 'rock') {
            alert(`User Won. Computer Chose ${choice} And User Chose Paper`);
        } else if (choice === 'paper'){
            alert(`Tie. Both Computer And User Chose ${choice}`);
        } else if (choice === 'scissors'){
            alert(`Computer Won. Computer Chose ${choice} User Chose Paper`)
        }
    ">Paper</button>
    <button onclick="
        compChoice();
        if (choice === 'rock') {
            alert(`Computer Won. Computer Chose ${choice} And User Chose Scissors`);
        } else if (choice === 'paper'){
            alert(`Computer Won. Computer Chose ${choice} User Chose Paper`);
        } else if (choice === 'scissors'){
            alert(`Tie. Both Computer And User Chose ${choice}`)
        }
    ">Scissors</button>
    <script>
        let choice =''
        function compChoice(){
            let num = Math.random()
            if (num>=0 && num<(1/3)){
                choice='rock'
            } else if (num>=(1/3) && num<(2/3)) {
                choice = 'paper'
            } else {
                choice = 'scissors'
            }
        }

    </script>
</body>
</html>
